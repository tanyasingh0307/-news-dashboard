<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>News Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="auth-bar" id="loggedOutBar">
            <button class="ghost-btn" onclick="openModal('login')">Log In</button>
            <button onclick="openModal('signup')">Sign Up</button>
        </div>

        <div class="auth-bar hidden" id="loggedInBar">
            <span id="userGreeting"></span>
            <button class="ghost-btn" onclick="logout()">Log Out</button>
        </div>

        <h1>📰 News Dashboard</h1>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search news...">
            <button onclick="fetchNews()">Fetch News</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="allNewsTab" onclick="showAllNews()">All News</button>
            <button class="tab-btn" id="bookmarksTab" onclick="showBookmarks()">My Bookmarks</button>
        </div>
    </header>

    <div id="news-container"></div>

    <!-- Login / Signup Modal -->
    <div class="modal-overlay hidden" id="authModal">
        <div class="modal-box">
            <span class="modal-close" onclick="closeModal()">&times;</span>

            <div id="loginForm">
                <h2>Log In</h2>
                <div class="form-message" id="loginMessage"></div>
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Password">
                <button class="primary-btn" onclick="login()">Log In</button>
                <div class="switch-link">Don't have an account? <a onclick="switchToSignup()">Sign up</a></div>
            </div>

            <div id="signupForm" class="hidden">
                <h2>Sign Up</h2>
                <div class="form-message" id="signupMessage"></div>
                <input type="text" id="signupName" placeholder="Full Name">
                <input type="email" id="signupEmail" placeholder="Email">
                <input type="password" id="signupPassword" placeholder="Password (min 6 characters)">
                <button class="primary-btn" onclick="signup()">Sign Up</button>
                <div class="switch-link">Already have an account? <a onclick="switchToLogin()">Log in</a></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
